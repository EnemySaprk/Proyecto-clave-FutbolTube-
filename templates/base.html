<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block titulo %}FútbolTube{% endblock %}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #0f0f0f;
        color: #f1f1f1;
      }
      .navbar-custom {
        background-color: #1a1a2e;
        border-bottom: 2px solid #00d4aa;
      }
      .navbar-brand {
        color: #00d4aa !important;
        font-weight: bold;
        font-size: 1.5rem;
      }
      .nav-link {
        color: #aaa !important;
      }
      .nav-link:hover,
      .nav-link.active {
        color: #00d4aa !important;
      }
      .card-video {
        background-color: #1a1a1a;
        border: none;
        border-radius: 12px;
        overflow: hidden;
        transition: transform 0.2s, box-shadow 0.2s;
      }
      .card-video:hover {
        transform: translateY(-4px);
        box-shadow: 0 8px 25px rgba(0, 212, 170, 0.15);
      }
      .card-video img {
        width: 100%;
        aspect-ratio: 16/9;
        object-fit: cover;
      }
      .card-video .card-body {
        padding: 12px;
      }
      .card-video .card-title {
        font-size: 0.95rem;
        color: #f1f1f1;
        display: -webkit-box;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .card-video .card-text {
        font-size: 0.8rem;
        color: #888;
      }
      .badge-liga {
        background-color: #00d4aa;
        color: #0f0f0f;
        font-weight: 600;
      }
      .badge-canal {
        background-color: #e94560;
        color: white;
      }
      .sidebar-section h6 {
        color: #00d4aa;
        font-weight: 600;
        text-transform: uppercase;
        font-size: 0.8rem;
        letter-spacing: 1px;
        margin-bottom: 12px;
      }
      .sidebar-link {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 12px;
        color: #ccc;
        text-decoration: none;
        border-radius: 8px;
        transition: background 0.2s;
      }
      .sidebar-link:hover {
        background-color: #222;
        color: #00d4aa;
      }
      .sidebar-link img {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        object-fit: cover;
      }
      .section-title {
        color: #f1f1f1;
        font-weight: 600;
        margin-bottom: 20px;
        padding-bottom: 8px;
        border-bottom: 2px solid #00d4aa;
        display: inline-block;
      }
      a {
        text-decoration: none;
        color: inherit;
      }
      .destacado-badge {
        position: absolute;
        top: 8px;
        right: 8px;
        background: #e94560;
        color: white;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 0.7rem;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-custom sticky-top">
      <div class="container-fluid px-4">
        <a class="navbar-brand" href="{% url 'canales:home' %}">
          <i class="bi bi-trophy-fill"></i> FútbolTube
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="{% url 'canales:home' %}">
                <i class="bi bi-house-fill"></i> Inicio
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <link rel="manifest" href="/static/manifest.json" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png" />

    <!-- CONTENIDO -->
    <div class="container-fluid px-4 mt-3">
      <div class="row">
        <!-- SIDEBAR -->
        <div class="col-lg-2 d-none d-lg-block">
          <div class="sidebar-section mb-4">
            <h6><i class="bi bi-broadcast"></i> Canales</h6>
            {% for canal in canales_sidebar %}
            <a href="{% url 'canales:canal' canal.slug %}" class="sidebar-link">
              {% if canal.logo %}
              <img src="{{ canal.logo.url }}" alt="{{ canal.nombre }}" />
              {% else %}
              <i class="bi bi-tv" style="font-size: 1.2rem"></i>
              {% endif %} {{ canal.nombre }}
            </a>
            {% endfor %}
          </div>
          <div class="sidebar-section">
            <h6><i class="bi bi-trophy"></i> Ligas</h6>
            {% for liga in ligas_sidebar %}
            <a href="{% url 'canales:liga' liga.slug %}" class="sidebar-link">
              {% if liga.logo %}
              <img src="{{ liga.logo.url }}" alt="{{ liga.nombre }}" />
              {% else %}
              <i class="bi bi-shield-fill" style="font-size: 1.2rem"></i>
              {% endif %} {{ liga.nombre }}
            </a>
            {% endfor %}
          </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="col-lg-10">{% block contenido %}{% endblock %}</div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/sw.js')
                .then(function(registration) {
                    console.log('SW registrado');
                });
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
  </body>
</html>
