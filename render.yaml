databases:
  - name: deptv-db
    plan: free
    databaseName: deptv

services:
  - type: web
    name: deptv
    plan: free
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.1
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
